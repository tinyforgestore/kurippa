name: Build & Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          args: --target universal-apple-darwin
          includeUpdaterJson: false

      - name: Sign macOS updater artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAR="src-tauri/target/universal-apple-darwin/release/bundle/macos/Kurippa.app.tar.gz"
          pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TAR"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Kurippa.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Kurippa.app.tar.gz.sig

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeUpdaterJson: false

      - name: Create and sign Windows updater artifact
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = "${{ inputs.tag }}" -replace '^v', ''
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $exe = "$nsisDir\Kurippa_${version}_x64-setup.exe"
          $zip = "$nsisDir\Kurippa_${version}_x64-setup.nsis.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          pnpm tauri signer sign `
            -k "$env:TAURI_SIGNING_PRIVATE_KEY" `
            --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" `
            $zip

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $version = "${{ inputs.tag }}" -replace '^v', ''
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          Copy-Item "$nsisDir\Kurippa_${version}_x64-setup.exe"          staging\
          Copy-Item "$nsisDir\Kurippa_${version}_x64-setup.nsis.zip"     staging\
          Copy-Item "$nsisDir\Kurippa_${version}_x64-setup.nsis.zip.sig" staging\

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: staging/

  publish:
    name: Create Release & Publish
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Kurippa ${{ inputs.tag }}" \
            --latest \
            --generate-notes

      - name: Upload artifacts and generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Stable-name copies
          cp "$(find macos -name "*.dmg"           | head -1)" Kurippa_universal.dmg
          cp "$(find macos -name "*.tar.gz"        | head -1)" Kurippa_universal.app.tar.gz
          cp "$(find windows -name "*.exe"         | head -1)" Kurippa_x64-setup.exe
          cp "$(find windows -name "*.nsis.zip"    | head -1)" Kurippa_x64-setup.nsis.zip

          gh release upload "$TAG" Kurippa_universal.dmg          --repo "$REPO" --clobber
          gh release upload "$TAG" Kurippa_universal.app.tar.gz   --repo "$REPO" --clobber
          gh release upload "$TAG" Kurippa_x64-setup.exe          --repo "$REPO" --clobber
          gh release upload "$TAG" Kurippa_x64-setup.nsis.zip     --repo "$REPO" --clobber

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg macos_sig "$(cat "$(find macos   -name "*.sig" | head -1)")" \
            --arg macos_url "${BASE_URL}/Kurippa_universal.app.tar.gz" \
            --arg win_sig   "$(cat "$(find windows -name "*.sig" | head -1)")" \
            --arg win_url   "${BASE_URL}/Kurippa_x64-setup.nsis.zip" \
            '{
              version:  $version,
              notes:    "",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $macos_sig, url: $macos_url },
                "darwin-x86_64":  { signature: $macos_sig, url: $macos_url },
                "windows-x86_64": { signature: $win_sig,   url: $win_url }
              }
            }' > latest.json

          cat latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
